<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adicionar Imagens</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Adicionar Imagens ao Site</h1>
    
    <!-- Botão para escolher imagem -->
    <input type="file" id="input-imagem" accept="image/*">
    
    <!-- Onde a imagem será exibida -->
    <div id="preview-container"></div>
  </div>

  <script>
    const inputImagem = document.getElementById("input-imagem");
    const previewContainer = document.getElementById("preview-container");

    inputImagem.addEventListener("change", function () {
      const arquivo = this.files[0];

      if (arquivo) {
        const reader = new FileReader();

        reader.addEventListener("load", function () {
          const img = document.createElement("img");
          img.src = this.result;
          img.style.width = "300px";
          img.style.margin = "10px";
          img.style.borderRadius = "15px";
          img.style.boxShadow = "0 4px 10px rgba(0,0,0,0.2)";
          previewContainer.innerHTML = ""; // Limpa anterior
          previewContainer.appendChild(img);
        });

        reader.readAsDataURL(arquivo);
      }
    });
  </script>
</body>
</html>
<audio autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
  Seu navegador não suporta áudio.
</audio>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player de Música</title>
  <style>
    body {
      background-color: #1c1c1c;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }

    .player-container {
      background: #292929;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      display: inline-block;
    }

    .player-container h2 {
      margin-bottom: 20px;
      color: #0af;
    }

    audio {
      width: 100%;
      max-width: 300px;
      outline: none;
    }
  </style>
</head>
<body>

  <div class="player-container">
    <h2>Minha Música Favorita</h2>
    <audio controls>
      <source src="musica.mp3" type="audio/mpeg">
      Seu navegador não suporta o elemento de áudio.
    </audio>
  </div>

</body>
</html>
